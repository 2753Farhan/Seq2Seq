# Data Configuration
data:
  dataset_name: 'Nan-Do/code-search-net-python'
  max_src_len: 50
  max_tgt_len: 80
  batch_size: 32
  num_workers: 0
  train_size: 8000
  valid_size: 1000
  test_size: 1000
  src_max_vocab: 8000
  tgt_max_vocab: 8000

# Model Configuration
model:
  embedding_dim: 256  # Increased from 128
  hidden_dim: 512      # Increased from 256
  num_layers: 2        # Increased from 1
  dropout: 0.5         # Increased from 0.3
  encoder_dropout: 0.5
  decoder_dropout: 0.5
  teacher_forcing_ratio: 0.5
  teacher_forcing_decay: 0.95  # New: decay teacher forcing each epoch

# Training Configuration
training:
  epochs: 15           # Increased from 10
  learning_rate: 0.001
  weight_decay: 0.00005   # New: L2 regularization
  clip: 1.0
  save_checkpoints: true
  checkpoint_dir: 'outputs/models'
  log_interval: 100
  early_stopping_patience: 3  # New
  lr_scheduler: 'reduce_on_plateau'  # New

# Evaluation Configuration
evaluation:
  calculate_bleu: true
  calculate_exact_match: true
  calculate_token_accuracy: true  # New
  save_predictions: true
  prediction_file: 'outputs/results/predictions.txt'
  sample_predictions: 20

# Visualization Configuration
visualization:
  save_plots: true
  plot_dir: 'outputs/plots'
  attention_samples: 5
  figure_size: [12, 8]
  dpi: 100

# Paths
paths:
  data_dir: 'data/'
  model_dir: 'outputs/models/'
  results_dir: 'outputs/results/'
  plots_dir: 'outputs/plots/'